element1:
  name: Ensure that the kubeconfig file permissions
  requirements:
  - 3.1.1 Ensure that the kubeconfig file permissions are set to 644 or more restrictive
element2:
  name: Ensure that the kubelet configuration file
  requirements:
  - 3.1.3 Ensure that the kubelet configuration file has permissions set to 644 or
    more restrictive
element3:
  name: Ensure that the --authorization-mode argument is
  requirements:
  - 3.2.2 Ensure that the --authorization-mode argument is not set to AlwaysAllow
    (Automated)
element4:
  name: Ensure that the --streaming-connection-idle-timeout argument is
  requirements:
  - 3.2.5 Ensure that the --streaming-connection-idle-timeout argument is not set
    to
element5:
  name: Ensure that the --eventRecordQPS argument is
  requirements:
  - 3.2.7 Ensure that the --eventRecordQPS argument is set to 0 or a level which ensures
element6:
  name: Ensure that the --rotate-certificates argument is
  requirements:
  - 3.2.8 Ensure that the --rotate-certificates argument is not present or is set
    to true (Automated)
element7:
  name: Ensure that the RotateKubeletServerCertificate argument is
  requirements:
  - 3.2.9 Ensure that the RotateKubeletServerCertificate argument is set to true (Automated)
element8:
  name: Ensure that Service Account Tokens are
  requirements:
  - 4.1.6 Ensure that Service Account Tokens are only mounted where necessary (Automated)
